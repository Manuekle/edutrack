<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#4F46E5"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)"/>
  
  <!-- Book shape -->
  <g transform="translate(106, 140)">
    <!-- Left page -->
    <path d="M20 20 L20 200 Q20 220 40 220 L140 220 L140 20 Q140 0 120 0 L40 0 Q20 0 20 20Z" 
          fill="#ffffff" opacity="0.95"/>
    <!-- Right page -->
    <path d="M180 20 L180 200 Q180 220 160 220 L60 220 L60 20 Q60 0 80 0 L160 0 Q180 0 180 20Z" 
          fill="#ffffff" opacity="0.85"/>
    <!-- Spine -->
    <rect x="145" y="0" width="10" height="220" fill="#4F46E5" opacity="0.3"/>
    <!-- Page lines left -->
    <line x1="35" y1="45" x2="115" y2="45" stroke="#6366F1" stroke-width="3" opacity="0.4"/>
    <line x1="35" y1="70" x2="115" y2="70" stroke="#6366F1" stroke-width="3" opacity="0.4"/>
    <line x1="35" y1="95" x2="115" y2="95" stroke="#6366F1" stroke-width="3" opacity="0.4"/>
    <line x1="35" y1="120" x2="95" y2="120" stroke="#6366F1" stroke-width="3" opacity="0.4"/>
    <!-- Page lines right -->
    <line x1="195" y1="45" x2="165" y2="45" stroke="#6366F1" stroke-width="3" opacity="0.4"/>
    <line x1="195" y1="70" x2="165" y2="70" stroke="#6366F1" stroke-width="3" opacity="0.4"/>
    <line x1="195" y1="95" x2="165" y2="95" stroke="#6366F1" stroke-width="3" opacity="0.4"/>
    <line x1="195" y1="120" x2="175" y2="120" stroke="#6366F1" stroke-width="3" opacity="0.4"/>
  </g>
  
  <!-- SIRA text -->
  <text x="256" y="420" 
        font-family="system-ui, -apple-system, sans-serif" 
        font-size="72" 
        font-weight="bold" 
        fill="#ffffff" 
        text-anchor="middle"
        letter-spacing="8">SIRA</text>
</svg>
